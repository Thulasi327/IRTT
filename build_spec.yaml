version: 0.1

component: build

timeoutInSeconds: 600

shell: bash

steps:
  - type: Command
    name: "Step 1 - Show Environment"
    command: |
      echo "Current directory:"
      pwd
      echo "Listing root files:"
      ls -l

  - type: Command
    name: "Step 2 - Validate Files"
    command: |
      if [ -f "table.sql" ]; then
        echo "table.sql found"
      else
        echo "ERROR: table.sql not found"
        exit 1
      fi

      if [ -d "junior_proj" ]; then
        echo "junior_proj folder found"
      else
        echo "ERROR: junior_proj folder not found"
        exit 1
      fi

  - type: Command
    name: "Step 3 - Read SQL File"
    command: |
      echo "Displaying table.sql content:"
      cat table.sql

  - type: Command
    name: "Step 4 - Process Project Folder"
    command: |
      echo "Inside junior_proj:"
      ls -l junior_proj

  - type: Command
    name: "Step 5 - Dummy Build"
    command: |
      echo "Build started..."
      mkdir -p output
      cp table.sql output/
      echo "Build completed"

  - type: Command
    name: "Step 6 - Dummy Test"
    command: |
      echo "Running tests..."
      echo "All tests passed"

outputArtifacts:
  - name: build_output
    type: BINARY
    location: output
