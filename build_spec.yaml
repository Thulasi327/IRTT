version: 0.1

component: build

timeoutInSeconds: 600

shell: bash

steps:
  - type: Command
    name: "Install Dependencies"
    command: |
      echo "Installing dependencies..."
      ls -l
      pwd

  - type: Command
    name: "Verify Project Structure"
    command: |
      echo "Checking folder structure..."
      ls -R

  - type: Command
    name: "Run SQL File (Optional)"
    command: |
      echo "Processing SQL file..."
      cat table.sql

  - type: Command
    name: "Build Step"
    command: |
      echo "Build started..."
      echo "Compiling project in junior_proj..."
      ls junior_proj

  - type: Command
    name: "Test Step"
    command: |
      echo "Running tests..."
      echo "All tests passed"

outputArtifacts:
  - name: build_output
    type: BINARY
    location: .
