version: 0.1

component: build

shell: bash

timeoutInSeconds: 600

steps:
  - type: Command
    name: "Check Environment"
    command: |
      echo "Build started"
      pwd
      ls -al

  - type: Command
    name: "Check Files"
    command: |
      echo "Checking required files..."

      if [ ! -f table.sql ]; then
        echo "table.sql NOT found"
        exit 1
      fi

      if [ ! -d junior_proj ]; then
        echo "junior_proj folder NOT found"
        exit 1
      fi

      echo "All required files exist"

  - type: Command
    name: "Process SQL"
    command: |
      echo "Reading SQL file"
      cat table.sql

  - type: Command
    name: "List Project Folder"
    command: |
      echo "Listing junior_proj contents"
      ls -al junior_proj

  - type: Command
    name: "Create Artifact"
    command: |
      echo "Creating output"
      mkdir output
      cp table.sql output/

outputArtifacts:
  - name: output-artifact
    type: BINARY
    location: output
