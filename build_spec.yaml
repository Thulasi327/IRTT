version: 0.1

component: build

shell: bash

timeoutInSeconds: 600

steps:
  - type: Command
    name: "Check Environment"
    command: |
      echo "Build started"
      pwd
      ls -al

  - type: Command
    name: "Prepare Output Folder"
    command: |
      echo "Creating output folder"
      mkdir -p output

      echo "Adding file to output"
      echo "Build successful" > output/result.txt

      # Ensure it's NOT empty
      ls -l output

outputArtifacts:
  - name: output-artifact
    type: BINARY
    location: output
